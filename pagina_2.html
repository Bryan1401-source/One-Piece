<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada - Subtração</title>
    <link rel="stylesheet" href="pagina_2.css">
</head>
<body>

    <div class="tabuada-container">
        <h1 class="title">Tabuada Online</h1>
        
        <div class="box-tabuada">
            <div class="subtitle">Tabuada de Subtração(-)</div>
            
            <div class="controle-numero">
                <button class="btn-seta" onclick="alterarNumero(-1)">-</button>
                <div class="numero-atual" id="num-display">5</div>
                <button class="btn-seta" onclick="alterarNumero(1)">+</button>
            </div>

            <div class="tabuada-grade" id="grade-resultado">
            </div>

            <div class="area-navegacao">
                <div class="linhas-botoes">
                    <button class="btn-nav btn-voltar" onclick="irParaSoma()">➕ Soma</button>
                </div>
                <div class="linhas-botoes dupla">
                    <button class="btn-nav" onclick="irParaPagina3()">✖️ Multiplicação</button>
                    <button class="btn-nav btn-avancar" onclick="irParaPagina4()">➗ Divisão</button>
                </div>
            </div>
        </div>
    </div>

    <script src="pagina_2.js"></script>
</body>
</html>
