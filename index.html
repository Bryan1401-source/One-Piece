<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Online - Soma</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="tabuada-container">
        <h1 class="title">Calculadora Online</h1>
        
        <div class="box-tabuada">
            <div class="subtitle">Módulo: Tabuada de Soma (+)</div>
            
            <!-- Controle do Número -->
            <div class="controle-numero">
                <button class="btn-seta" onclick="alterarNumero(-1)">-</button>
                <div class="numero-atual" id="num-display">5</div>
                <button class="btn-seta" onclick="alterarNumero(1)">+</button>
            </div>

            <div class="tabuada-grade" id="grade-resultado">
            </div>

            <div class="area-externa">
                <p>Navegar para outras tabuadas:</p>
                <button class="btn-link" onclick="irParaMultiplicacao()">Ir para Multiplicação (×) ➔</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
